services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: movie
      POSTGRES_PASSWORD: movie
      POSTGRES_DB: movie_reservation
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U movie -d movie_reservation"]
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
